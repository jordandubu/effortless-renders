# ─────────────────────────────────────────────────────────────
# Auto-Release Pipeline
# Creates a GitHub Release with addon zip when a tag is pushed.
# Usage: git tag v1.2 && git push --tags
# ─────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Package addon
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_NAME="effortless-renders-${VERSION}"
          INTERNAL_NAME="effortless_renders"

          mkdir -p "$INTERNAL_NAME"
          cp -r __init__.py main.py operators.py panels.py preferences.py properties.py utils.py "$INTERNAL_NAME/"

          zip -r "${RELEASE_NAME}.zip" "$INTERNAL_NAME"
          echo "📦 Created ${RELEASE_NAME}.zip"
          ls -lh "${RELEASE_NAME}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: effortless-renders-*.zip
          draft: false
          prerelease: false
